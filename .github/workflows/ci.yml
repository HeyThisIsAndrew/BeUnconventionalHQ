# CI: unit tests + production build on every push and PR.
#
# Why these two jobs cover what matters:
# - `npm test` runs the offline suites (events date helpers, live-status,
#   video merge) — 40 assertions, no credentials, no network.
# - `astro build` compiles every page. Sanity fetches fail in CI (no token,
#   and none should ever be added here) — pages try/catch to empty data by
#   design, so a green build still proves templates, imports, Tailwind, and
#   the worker bundle all compile.
name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build
